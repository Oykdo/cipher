name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual run? (artifacts only, no release publish)'
        required: false
        default: 'manual test'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            builder_flag: --linux
            artifact_name: cipher-linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
          - os: windows-latest
            builder_flag: --win
            artifact_name: cipher-windows
            artifact_glob: release/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/bridge/package-lock.json
            apps/frontend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install bridge deps
        run: npm ci
        working-directory: apps/bridge

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/frontend

      # apps/bridge/.env.production is gitignored and listed in the
      # electron-builder `files` array. If the BRIDGE_ENV_PRODUCTION secret
      # is set we materialize it; otherwise we drop an empty file so the
      # packager doesn't choke on the missing entry. The bridge env loader
      # in main.js silently ignores empty/missing files.
      - name: Materialize apps/bridge/.env.production
        shell: bash
        env:
          BRIDGE_ENV_PRODUCTION: ${{ secrets.BRIDGE_ENV_PRODUCTION }}
        run: |
          if [ -n "${BRIDGE_ENV_PRODUCTION:-}" ]; then
            printf '%s\n' "$BRIDGE_ENV_PRODUCTION" > apps/bridge/.env.production
            echo "✓ .env.production materialized from secret"
          else
            : > apps/bridge/.env.production
            echo "⚠ BRIDGE_ENV_PRODUCTION secret not set — shipping with empty .env.production"
          fi

      - name: Build frontend + bridge
        run: npm run build:all

      # Always build with --publish never. The release upload is done in
      # the separate "Publish to GitHub Release" step below so the Windows
      # .exe can be code-signed in between (the previous --publish always
      # approach would have uploaded the unsigned binary directly).
      - name: Package with electron-builder
        shell: bash
        run: |
          npx electron-builder ${{ matrix.builder_flag }} --publish never

      # Sign the Windows installer with Azure Trusted Signing.
      # Skipped silently until the repo variable AZURE_SIGNING_ENABLED is
      # set to 'true' (so existing builds keep working before an Azure
      # Trusted Signing account is provisioned). See
      # docs/azure-trusted-signing.md for the full setup procedure +
      # the list of secrets / variables this step expects.
      - name: Sign Windows installer (Azure Trusted Signing)
        if: matrix.os == 'windows-latest' && vars.AZURE_SIGNING_ENABLED == 'true'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Smoke test Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          APPIMAGE=$(ls *.AppImage 2>/dev/null | head -1 || true)
          DEB=$(ls *.deb 2>/dev/null | head -1 || true)
          if [ -z "$APPIMAGE" ] || [ -z "$DEB" ]; then
            echo "::error::Missing artifact (AppImage='$APPIMAGE' deb='$DEB')"
            ls -la
            exit 1
          fi
          APPIMAGE_SIZE=$(stat -c%s "$APPIMAGE")
          DEB_SIZE=$(stat -c%s "$DEB")
          echo "AppImage: $APPIMAGE ($APPIMAGE_SIZE bytes)"
          echo "deb:      $DEB ($DEB_SIZE bytes)"
          # An Electron bundle is always >30MB; anything smaller means the
          # packager truncated or skipped the embedded chromium.
          if [ "$APPIMAGE_SIZE" -lt 30000000 ]; then
            echo "::error::AppImage suspiciously small (<30MB) — likely truncated"
            exit 1
          fi
          if [ "$DEB_SIZE" -lt 30000000 ]; then
            echo "::error::deb suspiciously small (<30MB) — likely truncated"
            exit 1
          fi
          chmod +x "$APPIMAGE"
          ./"$APPIMAGE" --appimage-extract > /dev/null
          test -f squashfs-root/AppRun
          echo "✓ AppImage extracts cleanly and contains AppRun"

      # Publish to the GitHub Release on tag push. Replaces the previous
      # `--publish always` flag on electron-builder so the SIGNED Windows
      # .exe lands in the release rather than the unsigned one. Linux
      # artifacts (.AppImage, .deb) ride along through the same step.
      - name: Publish to GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true

      - name: Upload artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
